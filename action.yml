name: "llm-release-gate"
description: >-
  Block unsafe LLM app changes: run baseline vs candidate configs over a golden
  dataset, compare quality/abstention/citations/schema/latency/tokens/cost,
  comment the summary on the PR, and fail the check on a material regression.
author: "llm-release-gate contributors"
branding:
  icon: "shield"
  color: "red"

inputs:
  dataset:
    description: "Path to the golden dataset JSON"
    required: true
  baseline:
    description: "Path to the baseline run-config JSON"
    required: true
  candidate:
    description: "Path to the candidate run-config JSON"
    required: true
  scorers:
    description: "Path to the scorer-config JSON"
    required: true
  thresholds:
    description: "Path to the thresholds JSON"
    required: true
  pricing:
    description: "Path to the pricing-table JSON (omit: cost reported unavailable)"
    required: false
    default: ""
  out:
    description: "Output directory for reports and the run manifest"
    required: false
    default: "llm-release-gate-out"
  comment:
    description: "Post/update the Markdown summary as a PR comment ('true'/'false')"
    required: false
    default: "true"
  github-token:
    description: "Token used to post the PR comment"
    required: false
    default: ${{ github.token }}
  python-version:
    description: "Python version to run the gate with"
    required: false
    default: "3.12"

outputs:
  verdict:
    description: "'pass' or 'fail' (empty if the gate could not run)"
    value: ${{ steps.gate.outputs.verdict }}
  result-hash:
    description: "Content hash identifying this comparison result"
    value: ${{ steps.gate.outputs.result-hash }}
  report-json:
    description: "Path to report.json"
    value: ${{ steps.gate.outputs.report-json }}
  report-md:
    description: "Path to report.md"
    value: ${{ steps.gate.outputs.report-md }}
  report-html:
    description: "Path to report.html"
    value: ${{ steps.gate.outputs.report-html }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install llm-release-gate
      shell: bash
      run: python -m pip install --quiet "${{ github.action_path }}"

    # Run the gate but defer the exit code so the PR comment is posted for
    # failing candidates too — a silent red X without the report defeats the point.
    - name: Run gate
      id: gate
      shell: bash
      run: |
        set +e
        args=(
          --dataset   "${{ inputs.dataset }}"
          --baseline  "${{ inputs.baseline }}"
          --candidate "${{ inputs.candidate }}"
          --scorers   "${{ inputs.scorers }}"
          --thresholds "${{ inputs.thresholds }}"
          --out       "${{ inputs.out }}"
        )
        if [ -n "${{ inputs.pricing }}" ]; then
          args+=(--pricing "${{ inputs.pricing }}")
        fi
        python -m llm_release_gate gate "${args[@]}"
        code=$?
        echo "cli-exit=$code" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Comment on pull request
      if: >-
        inputs.comment == 'true' && github.event_name == 'pull_request' &&
        steps.gate.outputs.report-md != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPORT_MD: ${{ steps.gate.outputs.report-md }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        # Update the previous gate comment when possible; fall back to a new one.
        gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$REPORT_MD" \
          --edit-last --create-if-none \
          || gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$REPORT_MD"

    - name: Enforce gate verdict
      shell: bash
      run: |
        code="${{ steps.gate.outputs.cli-exit }}"
        if [ "$code" = "0" ]; then
          echo "gate passed"
        elif [ "$code" = "1" ]; then
          echo "::error::llm-release-gate blocked this change (material regression). See the PR comment / job summary."
          exit 1
        else
          echo "::error::llm-release-gate could not evaluate (exit $code) — fix the gate configuration."
          exit "${code:-2}"
        fi
