name: "llm-release-gate"
description: >-
  Block unsafe LLM app changes: run baseline vs candidate configs over a golden
  dataset, compare quality/abstention/citations/schema/latency/tokens/cost,
  comment the summary on the PR, and fail the check on a material regression.
author: "llm-release-gate contributors"
branding:
  icon: "shield"
  color: "red"

inputs:
  dataset:
    description: "Path to the golden dataset JSON"
    required: true
  baseline:
    description: "Path to the baseline run-config JSON"
    required: true
  candidate:
    description: "Path to the candidate run-config JSON"
    required: true
  scorers:
    description: "Path to the scorer-config JSON"
    required: true
  thresholds:
    description: "Path to the thresholds JSON"
    required: true
  pricing:
    description: "Path to the pricing-table JSON (omit: cost reported unavailable)"
    required: false
    default: ""
  out:
    description: "Output directory for reports and the run manifest"
    required: false
    default: "llm-release-gate-out"
  comment:
    description: "Post/update the Markdown summary as a PR comment ('true'/'false')"
    required: false
    default: "true"
  github-token:
    description: "Token used to post the PR comment"
    required: false
    default: ${{ github.token }}
  python-version:
    description: "Python version to run the gate with"
    required: false
    default: "3.12"

outputs:
  verdict:
    description: "'pass' or 'fail' (empty if the gate could not run)"
    value: ${{ steps.gate.outputs.verdict }}
  result-hash:
    description: "Content hash identifying this comparison result"
    value: ${{ steps.gate.outputs.result-hash }}
  report-json:
    description: "Path to report.json"
    value: ${{ steps.gate.outputs.report-json }}
  report-md:
    description: "Path to report.md"
    value: ${{ steps.gate.outputs.report-md }}
  report-html:
    description: "Path to report.html"
    value: ${{ steps.gate.outputs.report-html }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install llm-release-gate
      shell: bash
      run: python -m pip install --quiet "${{ github.action_path }}"

    # Run the gate but defer the exit code so the PR comment is posted for
    # failing candidates too — a silent red X without the report defeats the point.
    # Inputs are passed via env (never interpolated into the script text): a
    # ${{ }} expansion inside `run` would execute attacker-controlled input.
    - name: Run gate
      id: gate
      shell: bash
      env:
        IN_DATASET: ${{ inputs.dataset }}
        IN_BASELINE: ${{ inputs.baseline }}
        IN_CANDIDATE: ${{ inputs.candidate }}
        IN_SCORERS: ${{ inputs.scorers }}
        IN_THRESHOLDS: ${{ inputs.thresholds }}
        IN_PRICING: ${{ inputs.pricing }}
        IN_OUT: ${{ inputs.out }}
      run: |
        set +e
        args=(
          --dataset    "$IN_DATASET"
          --baseline   "$IN_BASELINE"
          --candidate  "$IN_CANDIDATE"
          --scorers    "$IN_SCORERS"
          --thresholds "$IN_THRESHOLDS"
          --out        "$IN_OUT"
        )
        if [ -n "$IN_PRICING" ]; then
          args+=(--pricing "$IN_PRICING")
        fi
        python -m llm_release_gate gate "${args[@]}"
        code=$?
        echo "cli-exit=$code" >> "$GITHUB_OUTPUT"
        exit 0

    # Finds this action's own previous comment via a marker (never touches other
    # bots' comments) and updates it, else creates one. Comment delivery failure
    # (e.g. missing `pull-requests: write`) is a warning, not a failed check —
    # the verdict must come from the gate, and the enforce step must still run.
    - name: Comment on pull request
      if: >-
        inputs.comment == 'true' &&
        (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') &&
        steps.gate.outputs.report-md != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPORT_MD: ${{ steps.gate.outputs.report-md }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        set +e
        marker="<!-- llm-release-gate-report -->"
        body_file="$(mktemp)"
        printf '%s\n\n' "$marker" | cat - "$REPORT_MD" > "$body_file"
        comment_id=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
          --jq "[.[] | select(.body | startswith(\"$marker\"))][0].id" 2>/dev/null)
        if [ -n "$comment_id" ] && [ "$comment_id" != "null" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$comment_id" -F body=@"$body_file" >/dev/null
        else
          gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" -F body=@"$body_file" >/dev/null
        fi
        if [ $? -ne 0 ]; then
          echo "::warning::llm-release-gate could not post the PR comment (does the workflow grant 'pull-requests: write'?). The verdict is unaffected; see the job summary."
        fi
        exit 0

    - name: Enforce gate verdict
      shell: bash
      run: |
        code="${{ steps.gate.outputs.cli-exit }}"
        if [ "$code" = "0" ]; then
          echo "gate passed"
        elif [ "$code" = "1" ]; then
          echo "::error::llm-release-gate blocked this change (material regression). See the PR comment / job summary."
          exit 1
        else
          echo "::error::llm-release-gate could not evaluate (exit $code) — fix the gate configuration."
          exit "${code:-2}"
        fi
